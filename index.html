<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GenAI Media Workbench</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════════════════════════════════
       BESTSELLER ENTERPRISE DESIGN SYSTEM
       Primary reference: BESTSELLER.com + corporate editorial standards
       Philosophy: Nordic restraint — monochrome precision, editorial space
    ═══════════════════════════════════════════════════════════════════════ */

    :root {
      --bs-black:    #0A0A0A;
      --bs-ink:      #1A1A1A;
      --bs-charcoal: #2C2C2C;
      --bs-mid:      #6B6B6B;
      --bs-muted:    #9B9B9B;
      --bs-ash:      #C8C8C8;
      --bs-smoke:    #E4E4E4;
      --bs-fog:      #F2F2F2;
      --bs-page:     #F7F6F4;
      --bs-white:    #FFFFFF;

      --bs-signal:   #1A3A5C;
      --bs-signal-l: #EEF3F8;
      --bs-signal-m: #3D6E9E;

      --bs-ok:       #1A4D30;
      --bs-ok-l:     #EBF5EF;
      --bs-warn:     #5C3600;
      --bs-warn-l:   #FEF7EC;
      --bs-risk:     #5C1A1A;
      --bs-risk-l:   #FDEAEA;

      --r:    3px;
      --rm:   5px;
      --rl:   8px;

      --font: "Inter", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
      --bench-sticky-top: 142px;
      --runtime-sticky-top: var(--bench-sticky-top);
    }

    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bs-page);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      color: var(--bs-ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button, input, textarea { font-family: inherit; }

    /* ── Sticky nav ──────────────────────────────────────── */
    .nav-shell {
      position: sticky;
      top: 0;
      z-index: 220;
      background: var(--bs-white);
      border-bottom: 1px solid var(--bs-smoke);
    }
    .page-content { padding-top: 40px; }

    /* ── App wrapper ────────────────────────────────────── */
    .app { max-width: 1120px; margin: 0 auto; padding: 0 32px 80px; }

    /* ── Header ─────────────────────────────────────────── */
    .header {
      position: relative;
      padding: 20px 0 0;
      background: var(--bs-white);
    }
    .bs-wordmark {
      position: absolute;
      top: 20px;
      right: 18px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .bs-wordmark-main {
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--bs-black);
      line-height: 1;
    }
    .bs-wordmark-sub {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--bs-muted);
      line-height: 1;
    }
    .hero-copy { padding-right: 230px; padding-left: 12px; padding-bottom: 18px; }
    .bs-page-title,
    .workbench-title {
      font-size: clamp(28px, 3.9vw, 42px);
      font-weight: 700;
      letter-spacing: -.025em;
      color: var(--bs-black);
      line-height: 1.04;
      margin: 0;
    }
    .bs-page-title span { font-weight: 300; color: var(--bs-charcoal); }
    .hero-title-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .workbench-title {
      position: relative;
      display: inline-block;
      font-weight: 300;
      color: var(--bs-charcoal);
      padding-bottom: 0;
    }
    .hero-sub,
    .hero-pills { display: none; }
    .sep { width: 1px; height: 10px; background: var(--bs-ash); margin: 0 16px; }

    /* ── Primary navigation ─────────────────────────────── */
    .tabs { display: flex; overflow-x: auto; background: var(--bs-white); border-top: 1px solid var(--bs-smoke); scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { font-size: 11.5px; font-weight: 500; padding: 13px 22px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--bs-muted); cursor: pointer; white-space: nowrap; letter-spacing: .02em; transition: color .15s; }
    .tab:hover { color: var(--bs-ink); }
    .tab.active { color: var(--bs-black); border-bottom-color: var(--bs-black); font-weight: 600; }

    /* ── Section label ──────────────────────────────────── */
    .divider { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .divider-badge { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .14em; padding: 4px 12px; border-radius: var(--r); background: var(--bs-ink); color: var(--bs-white); white-space: nowrap; flex-shrink: 0; }
    .divider-line { flex: 1; height: 1px; background: var(--bs-smoke); }

    /* ── Cards & modules ────────────────────────────────── */
    .card { background: var(--bs-white); border: 1px solid var(--bs-smoke); border-radius: var(--rl); overflow: hidden; margin-bottom: 20px; }
    .card-pad { padding: 24px 28px; }
    .module-card { background: var(--bs-white); border: 1px solid var(--bs-smoke); border-radius: var(--rl); overflow: hidden; margin-bottom: 20px; }
    .module-head { padding: 18px 28px 16px; border-bottom: 1px solid var(--bs-smoke); background: var(--bs-white); display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .module-head-sub { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .16em; color: var(--bs-muted); margin-bottom: 3px; }
    .module-head-title { font-size: 13.5px; font-weight: 600; color: var(--bs-black); letter-spacing: -.01em; }
    .module-head-titlebar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .module-head-titlebar .divider-badge {
      background: var(--bs-black);
      color: var(--bs-white);
    }
    .module-body { padding: 24px 28px; }

    /* ── Brand grid ─────────────────────────────────────── */
    .grid-brands { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 5px; }
    .brand-btn { height: 52px; border-radius: var(--r); border: 1px solid var(--bs-smoke); background: var(--bs-white); display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: 600; font-size: 10px; color: var(--bs-charcoal); letter-spacing: .02em; transition: border-color .12s, background .12s, color .12s; }
    .brand-btn:hover { border-color: var(--bs-charcoal); background: var(--bs-fog); }
    .brand-btn.active { font-weight: 700; color: var(--bs-black); border-color: var(--bs-charcoal); background: var(--bs-white); }

    /* ── Chips ──────────────────────────────────────────── */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip { font-size: 11px; font-weight: 500; padding: 5px 14px; border-radius: var(--r); cursor: pointer; border: 1px solid var(--bs-smoke); background: var(--bs-white); color: var(--bs-mid); letter-spacing: .01em; transition: border-color .12s, color .12s, background .12s; }
    .chip:hover { border-color: var(--bs-charcoal); color: var(--bs-ink); }
    .chip.market-active { font-weight: 700; color: var(--bs-black); border-color: var(--bs-charcoal); background: var(--bs-white); }
    .chip.active { font-weight: 700; color: var(--bs-black); border-color: var(--bs-charcoal); background: var(--bs-white); }

    /* ── Use case grid ──────────────────────────────────── */
    .use-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr)); gap: 5px; }
    .use-card { text-align: left; padding: 13px 14px 11px; border-radius: var(--r); cursor: pointer; border: 1px solid var(--bs-smoke); background: var(--bs-white); transition: border-color .12s, background .12s; }
    .use-card:hover { border-color: var(--bs-charcoal); }
    .use-card.active { font-weight: 700; color: var(--bs-black); border-color: var(--bs-charcoal); background: var(--bs-white); }
    .use-title  { font-size: 11.5px; font-weight: 600; margin-bottom: 3px; line-height: 1.3; color: var(--bs-black); }
    .use-domain { font-size: 9.5px; color: var(--bs-muted); margin-bottom: 3px; letter-spacing: .03em; }
    .use-desc   { font-size: 9.5px; color: var(--bs-muted); line-height: 1.4; }

    /* ── Section anchor nav ─────────────────────────────── */
    .sec-nav { display: flex; gap: 2px; flex-wrap: wrap; margin-bottom: 28px; background: var(--bs-fog); border: 1px solid var(--bs-smoke); border-radius: var(--rm); padding: 5px; }
    .sec-nav button { padding: 6px 14px; border-radius: var(--r); border: 0; background: transparent; color: var(--bs-mid); cursor: pointer; font-size: 11px; font-weight: 500; letter-spacing: .02em; transition: background .1s, color .1s; }
    .sec-nav button:hover { background: var(--bs-white); color: var(--bs-black); }

    /* ── Workflow head ──────────────────────────────────── */
    .workflow-head { padding: 22px 28px 18px; border-bottom: 1px solid var(--bs-smoke); background: var(--bs-white); }
    .eyebrow { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .18em; color: var(--bs-muted); margin-bottom: 6px; }
    .workflow-title { font-size: 22px; font-weight: 700; color: var(--bs-black); letter-spacing: -.025em; line-height: 1.15; margin-bottom: 12px; }
    .pill { display: inline-flex; align-items: center; border-radius: var(--r); padding: 3px 9px; font-size: 10px; font-weight: 500; margin-right: 5px; margin-bottom: 3px; letter-spacing: .02em; }

    /* ── Workflow strip ─────────────────────────────────── */
    .workflow-strip { background: var(--bs-fog); border: 1px solid var(--bs-smoke); border-radius: var(--rm); padding: 18px; overflow-x: auto; }
    .steps { display: flex; align-items: stretch; min-width: 900px; }
    .step { width: 190px; background: var(--bs-white); border-radius: var(--r); border: 1px solid var(--bs-smoke); overflow: hidden; flex: 0 0 auto; }
    .step-bar   { height: 3px; }
    .step-body  { padding: 13px 14px 15px; }
    .step-badge { display: inline-block; font-size: 8.5px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; padding: 2px 7px; border-radius: var(--r); margin-bottom: 8px; }
    .step-name  { font-size: 12px; font-weight: 700; margin-bottom: 4px; color: var(--bs-black); }
    .step-tool  { font-size: 10px; font-weight: 600; margin-bottom: 5px; }
    .step-desc  { font-size: 10px; color: var(--bs-mid); line-height: 1.5; }
    .arrow { width: 32px; display: flex; align-items: center; justify-content: center; color: var(--bs-black); font-size: 16px; font-weight: 700; }

    /* ── Table ──────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 520px; }
    th { text-align: center; padding: 9px 10px; color: var(--bs-muted); font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; background: var(--bs-fog); border-bottom: 1px solid var(--bs-smoke); }
    th:first-child, td:first-child { text-align: left; }
    td { text-align: center; padding: 10px; border-bottom: 1px solid var(--bs-fog); color: var(--bs-ink); }
    tr:last-child td { border-bottom: none; }
    .score { border-radius: var(--r); padding: 2px 8px; font-size: 11px; font-weight: 600; }

    /* ── Feature cards ──────────────────────────────────── */
    .feature-card { border: 1px solid var(--bs-smoke); border-radius: var(--r); overflow: hidden; margin-bottom: 7px; background: var(--bs-white); }
    .feature-head { padding: 10px 16px; border-bottom: 1px solid var(--bs-smoke); display: flex; gap: 10px; align-items: center; background: var(--bs-fog); }
    .feature-body { padding: 14px 18px; font-size: 12px; color: var(--bs-mid); line-height: 1.7; }

    /* ── Tips ───────────────────────────────────────────── */
    .tips-list { display: flex; flex-direction: column; border: 1px solid var(--bs-smoke); border-radius: var(--r); overflow: hidden; }
    .tip-row { display: flex; align-items: stretch; font-size: 12.5px; line-height: 1.65; border-bottom: 1px solid var(--bs-smoke); }
    .tip-row:last-child { border-bottom: none; }
    .tip-label { font-size: 9.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--bs-ink); background: var(--bs-fog); min-width: 150px; width: 150px; padding: 14px 16px; flex-shrink: 0; display: flex; align-items: center; border-right: 1px solid var(--bs-smoke); }
    .tip-row > div:last-child { padding: 14px 18px; color: var(--bs-charcoal); flex: 1; }

    /* ── Legal ──────────────────────────────────────────── */
    .legal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .legal-card { border-radius: var(--r); overflow: hidden; border: 1px solid var(--bs-smoke); background: var(--bs-white); }
    .legal-head { padding: 12px 16px 10px; border-bottom: 1px solid var(--bs-smoke); background: var(--bs-fog); }
    .legal-head-label { font-size: 8.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .14em; margin-bottom: 2px; }
    .legal-head-title { font-size: 13px; font-weight: 700; color: var(--bs-black); }
    .legal-body { padding: 14px 16px; font-size: 12px; color: var(--bs-charcoal); line-height: 1.6; }
    .legal-item { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
    .legal-dot  { width: 5px; height: 5px; border-radius: 50%; flex: 0 0 auto; margin-top: 7px; }
    .notice { margin-top: 14px; padding: 12px 16px; background: var(--bs-fog); border: 1px solid var(--bs-smoke); border-left: 3px solid var(--bs-charcoal); border-radius: var(--r); }
    .notice-title { font-size: 9px; font-weight: 700; color: var(--bs-charcoal); text-transform: uppercase; letter-spacing: .14em; margin-bottom: 5px; }
    .notice p { margin: 0; font-size: 11px; color: var(--bs-mid); line-height: 1.7; }

    /* ── Bench inner tabs ───────────────────────────────── */
    .bench-inner-tabs { display: flex; border-bottom: 1px solid var(--bs-smoke); background: var(--bs-fog); overflow-x: auto; scrollbar-width: none; position: -webkit-sticky; position: sticky; top: var(--runtime-sticky-top); z-index: 180; }
    .bench-inner-tabs::before { content: ""; position: absolute; left: -32px; right: -32px; top: 0; bottom: 0; background: var(--bs-fog); pointer-events: none; z-index: -1; }
    .bench-inner-tabs::after { content: ""; position: absolute; left: -32px; right: -32px; top: 0; bottom: 0; background: var(--bs-fog); pointer-events: none; z-index: -1; }
    .bench-inner-tabs::-webkit-scrollbar { display: none; }
    .tools-filter-sticky { position: -webkit-sticky; position: sticky; top: var(--runtime-sticky-top); z-index: 175; background: var(--bs-page); padding: 12px 0 12px; margin: -12px 0 12px; isolation: isolate; overflow: visible; }
    .tools-filter-sticky::before { content: ""; position: absolute; left: -32px; right: -32px; top: 0; bottom: 0; background: var(--bs-page); pointer-events: none; z-index: -1; }
    .tools-filter-sticky::after { content: ""; position: absolute; left: -32px; right: -32px; top: 0; bottom: 0; background: var(--bs-page); pointer-events: none; z-index: -1; }
    .ai-tools-main { overflow: visible; }
    .category-label-chip { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; padding: 5px 14px; border-radius: var(--r); border: 3px solid var(--bs-black); background: var(--bs-white); color: var(--bs-black); letter-spacing: .01em; cursor: default; user-select: none; }
    .bench-inner-tab { font-size: 11px; font-weight: 500; padding: 10px 18px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--bs-muted); cursor: pointer; white-space: nowrap; letter-spacing: .02em; transition: color .12s; }
    .bench-inner-tab:hover { color: var(--bs-ink); }
    .bench-inner-tab.active { color: var(--bs-black); border-bottom-color: var(--bs-black); font-weight: 600; background: var(--bs-white); }
    .bench-tab-content { padding: 20px; }

    /* ── Model cards ────────────────────────────────────── */
    .model-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .model-card { background: var(--bs-white); border: 1px solid var(--bs-smoke); border-radius: var(--r); padding: 12px 14px; cursor: pointer; transition: border-color .12s; }
    .model-card:hover { border-color: var(--bs-charcoal); }
    .model-card.active { font-weight: 700; color: var(--bs-black); border-color: var(--bs-charcoal); background: var(--bs-white); }
    .model-link { display: inline-flex; align-items: center; gap: 3px; font-size: 9.5px; color: var(--bs-signal-m); font-weight: 500; text-decoration: none; margin-top: 6px; letter-spacing: .01em; }
    .model-link:hover { text-decoration: underline; }

    /* ── Selection controls ─────────────────────────────── */
    .check { width: 15px; height: 15px; border-radius: 2px; border: 1.5px solid var(--bs-ash); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; transition: background .1s, border-color .1s; }
    .check.active { background: var(--bs-black); color: var(--bs-white); border-color: var(--bs-black); }
    .radio-circle { width: 15px; height: 15px; border-radius: 50%; border: 1.5px solid var(--bs-ash); display: inline-flex; align-items: center; justify-content: center; font-size: 8px; flex-shrink: 0; }
    .radio-circle.active { background: var(--bs-black); color: var(--bs-white); border-color: var(--bs-black); }

    /* ── Criteria ───────────────────────────────────────── */
    .criteria-group { border: 1px solid var(--bs-smoke); border-radius: var(--r); overflow: hidden; margin-bottom: 7px; background: var(--bs-white); }
    .criteria-group-head { padding: 10px 16px; background: var(--bs-fog); border-bottom: 1px solid var(--bs-smoke); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background .1s; }
    .criteria-group-head:hover { background: var(--bs-smoke); }
    .criteria-group-title { font-size: 12px; font-weight: 600; color: var(--bs-black); }
    .criteria-weight { font-size: 10px; font-weight: 600; color: var(--bs-ink); background: var(--bs-smoke); border-radius: var(--r); padding: 2px 7px; }
    .criteria-items { padding: 10px 16px; display: flex; flex-direction: column; gap: 4px; }
    .criteria-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: var(--r); cursor: pointer; border: 1px solid var(--bs-smoke); background: var(--bs-white); font-size: 12px; color: var(--bs-charcoal); transition: border-color .1s; }
    .criteria-item:hover { border-color: var(--bs-charcoal); }
    .criteria-item.active { font-weight: 700; color: var(--bs-black); border-color: var(--bs-charcoal); background: var(--bs-white); }

    /* ── Use case list ──────────────────────────────────── */
    .bench-usecase-grid { display: grid; grid-template-columns: 1fr; gap: 4px; }
    .bench-usecase-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: var(--r); cursor: pointer; border: 1px solid var(--bs-smoke); background: var(--bs-white); transition: border-color .1s; }
    .bench-usecase-item:hover { border-color: var(--bs-charcoal); }
    .bench-usecase-item.active { font-weight: 700; color: var(--bs-black); border-color: var(--bs-charcoal); background: var(--bs-white); }
    .bench-usecase-text strong { font-size: 12px; font-weight: 600; display: block; margin-bottom: 2px; color: var(--bs-black); }
    .bench-usecase-text span   { font-size: 11px; color: var(--bs-mid); line-height: 1.4; }

    /* ── Context ────────────────────────────────────────── */
    .context-section { margin-bottom: 22px; }
    .context-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--bs-ink); margin-bottom: 10px; }
    .volume-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .context-textarea { width: 100%; border: 1px solid var(--bs-smoke); border-radius: var(--r); padding: 10px 14px; font-size: 13px; color: var(--bs-ink); resize: vertical; min-height: 90px; outline: none; line-height: 1.6; background: var(--bs-white); transition: border-color .12s; }
    .context-textarea:focus { border-color: var(--bs-charcoal); box-shadow: 0 0 0 3px rgba(0,0,0,.05); }

    /* ── Prompt ─────────────────────────────────────────── */
    .prompt-box { background: #0F0F0F; border-radius: var(--r); padding: 20px 24px; font-size: 11.5px; color: #C0C0C0; line-height: 1.8; font-family: 'Menlo','Consolas','Courier New',monospace; white-space: pre-wrap; word-break: break-word; min-height: 300px; }
    .copy-btn { background: var(--bs-black); color: var(--bs-white); border: none; border-radius: var(--r); padding: 10px 22px; font-size: 12px; font-weight: 600; cursor: pointer; margin-bottom: 16px; letter-spacing: .04em; transition: background .12s; }
    .copy-btn:hover { background: var(--bs-charcoal); }
    .copy-btn.copied { background: var(--bs-ok); }

    /* ── Results ────────────────────────────────────────── */
    .result-card { border: 1px solid var(--bs-smoke); border-radius: var(--r); background: var(--bs-white); overflow: hidden; margin-bottom: 10px; }
    .result-head { padding: 14px 18px 12px; border-bottom: 1px solid var(--bs-smoke); background: var(--bs-fog); display: flex; justify-content: space-between; align-items: center; }
    .bar { height: 3px; background: var(--bs-smoke); border-radius: 2px; overflow: hidden; }
    .bar div { height: 100%; border-radius: 2px; }

    /* ── Tools library ──────────────────────────────────── */
    .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 8px; }
    .tool-card { background: var(--bs-white); border: 1px solid var(--bs-smoke); border-radius: var(--r); overflow: hidden; transition: border-color .12s; }
    .tool-card:hover { border-color: var(--bs-charcoal); }
    .tool-head { padding: 14px 18px 12px; border-bottom: 1px solid var(--bs-smoke); background: var(--bs-fog); }
    .tag { border-radius: var(--r); padding: 2px 7px; font-size: 9px; font-weight: 600; letter-spacing: .04em; }

    /* ── Bench run button ───────────────────────────────── */

    function CriteriaTabGeneric({criteria, selectedCriteria, toggleCriterion}) {
      const toggleAll = (group) => {
        const ids = group.items.map(i=>i.id);
        const allSel = ids.every(id=>selectedCriteria.includes(id));
        ids.forEach(id=>{
          if(allSel && selectedCriteria.includes(id)) toggleCriterion(id);
          if(!allSel && !selectedCriteria.includes(id)) toggleCriterion(id);
        });
      };
      return <div className="bench-tab-content">
        {criteria.map(group=>{
          const allSel  = group.items.every(i=>selectedCriteria.includes(i.id));
          const someSel = group.items.some(i=>selectedCriteria.includes(i.id));
          return <div className="criteria-group" key={group.id}>
            <div className="criteria-group-head" onClick={()=>toggleAll(group)}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span className={"check "+(allSel?"active":"")}>{allSel?"✓":someSel?"–":""}</span>
                <div>
                  <span className="criteria-group-title">{group.label}</span>
                  {group.desc && <span style={{fontSize:10,color:"#6B7280",marginLeft:8}}>{group.desc}</span>}
                </div>
              </div>
              <span className="criteria-weight">{group.weight}</span>
            </div>
            <div className="criteria-items">

                {item.label}
              </div>)}
            </div>
          </div>;
        })}
      </div>;
    }

    function buildImagePrompt(p) {

      const ucName      = ucObj ? `${ucObj.label}\n  "${ucObj.desc}"` : "No use case selected";
      const criteria    = BENCHMARK_CRITERIA.map(g=>{const c=g.items.filter(i=>p.selectedCriteria.includes(i.id));return c.length?`  - ${g.label} (${g.weight}): ${c.map(x=>x.label).join(", ")}`:null;}).filter(Boolean).join("\n") || "  No criteria selected";
      const vol         = p.dailyVolume || "Not specified";
      const ctx         = p.reviewerContext.trim() || "None provided";
      const results     = p.benchmarkResults&&p.benchmarkResults.length ? p.benchmarkResults.map((r,i)=>`  ${i+1}. ${r.name} — ${r.overall}/100`).join("\n") : "  Not yet run";
      return `# Image Models Benchmark Prompt\n\nYou are an expert image model evaluator for fashion and e-commerce. Benchmark the models below against the specified use case and criteria.\n\n## Models\n${modelNames}\n\n## Use Case\n${ucName}\n\n## Criteria & Weights\n${criteria}\n\n## Volume\n${vol}\n\n## Reviewer Context\n${ctx}\n\n## Existing Results\n${results}\n\n## Instructions\n1. Score each criterion 0–100.\n2. Apply category weights to produce a final score per model.\n3. Flag models scoring below 60 in any category weighted >=15% as critical risk.\n4. Provide strengths, weaknesses, and recommended use cases per model.\n5. Rank all models and provide a Top Pick and Best Value recommendation.\n\n*Generated by GenAI Media Benchmark Tool — BESTSELLER Tech Creative Solutions*`;
    }

    // BENCHMARK COMPONENT
    // ════════════════════════════════════════════════════════
    function Benchmark({kind}) {
      const isImage = kind==="image";
      const [selectedModels,setSelectedModels]     = useState([]);
      const [selectedCriteria,setSelectedCriteria] = useState([]);
      const [selectedUseCase,setSelectedUseCase]   = useState(null);
      const [dailyVolume,setDailyVolume]           = useState(null);
      const [reviewerContext,setReviewerContext]   = useState("");
      const [benchmarkResults,setBenchmarkResults] = useState(null);
      const [innerTab,setInnerTab]                 = useState("models");

      const toggleModel     = id=>setSelectedModels(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
      const toggleCriterion = id=>setSelectedCriteria(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);

      const allModels = isImage ? ALL_BENCH_MODELS : ALL_VIDEO_MODELS;
      const imgAxes   = [["quality","Quality"],["speed","Speed"],["cost","Cost"],["ip","IP Safety"],["fashion","Fashion"],["enterprise","Enterprise"]];
      const vidAxes   = [["fidelity","Fidelity"],["p2v","Product-to-Video"],["motion","Motion"],["consistency","Consistency"],["safety","Brand Safety"],["marketing","Marketing"]];
      const axes = isImage ? imgAxes : vidAxes;

      const runBenchmark = () => {
        const chosen = allModels.filter(m=>selectedModels.includes(m.id));
        const res = chosen.map((m,idx)=>{
          const scores={};
          axes.forEach((a,i)=>scores[a[0]]=Math.max(58,Math.min(98,84-idx*3+((m.name.length+i*7)%13)-6)));
          const overall=Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/axes.length);
          return {...m,scores,overall};
        }).sort((a,b)=>b.overall-a.overall);
        setBenchmarkResults(res);
        setInnerTab("results");
      };

      const innerTabs = [
        {id:"models",  label:"Models"},
        {id:"criteria",label:"Criteria"},
        {id:"usecase", label:"Use case"},
        {id:"context", label:"Context"},
        {id:"results", label:"Benchmark Results"},
        {id:"prompt",  label:"Copy Benchmark Prompt"},
      ];

      const p = {selectedModels,selectedCriteria,selectedUseCase,dailyVolume,reviewerContext,benchmarkResults};
      const prompt = isImage ? buildImagePrompt(p) : buildVideoPrompt(p);

      return <section>
        <div style={{background:"white",border:"1px solid #e5e7eb",borderRadius:12,overflow:"visible"}}>
          <div className="bench-inner-tabs">
            {innerTabs.map(t=><button key={t.id} className={"bench-inner-tab "+(innerTab===t.id?"active":"")} onClick={()=>setInnerTab(t.id)}>
              {t.label}{t.id==="results"&&benchmarkResults?<span className="pill" style={{marginLeft:6,background:"#DCFCE7",color:"#166534",padding:"1px 6px",fontSize:9}}>done</span>:null}
            </button>)}
          </div>
          {innerTab==="models" && (isImage
            ? <ModelsTabGeneric standalone={IMG_STANDALONE} adobe={IMG_ADOBE} figma={IMG_FIGMA} selected={selectedModels} toggle={toggleModel}/>
            : <ModelsTabGeneric standalone={VID_STANDALONE} adobe={VID_ADOBE} figma={VID_FIGMA} selected={selectedModels} toggle={toggleModel}/>
          )}
          {innerTab==="criteria" && (isImage
            ? <CriteriaTabGeneric criteria={BENCHMARK_CRITERIA} selectedCriteria={selectedCriteria} toggleCriterion={toggleCriterion}/>
            : <CriteriaTabGeneric criteria={VIDEO_CRITERIA}     selectedCriteria={selectedCriteria} toggleCriterion={toggleCriterion}/>
          )}
          {innerTab==="usecase" && (isImage
            ? <UseCaseTabGeneric useCases={BENCH_USE_CASES}   selectedUseCase={selectedUseCase} setSelectedUseCase={setSelectedUseCase}/>
            : <UseCaseTabGeneric useCases={VIDEO_USE_CASES}   selectedUseCase={selectedUseCase} setSelectedUseCase={setSelectedUseCase}/>
          )}
          {innerTab==="context" && <>
            <ContextTab dailyVolume={dailyVolume} setDailyVolume={setDailyVolume} reviewerContext={reviewerContext} setReviewerContext={setReviewerContext}
              volumes={isImage?DAILY_VOLUMES:VIDEO_DAILY_VOLUMES}
              placeholder={isImage?undefined:"Evaluating for an automated product video pipeline. Speed and brand consistency are primary."}
            />
            <div style={{padding:"0 20px 20px"}}>
              <button className="bench-run-btn" onClick={runBenchmark} disabled={!selectedModels.length}>►BENCHMARK MODELS</button>
            </div>
          </>}
          {innerTab==="results" && <div style={{padding:24,minHeight:400}}>
            {!benchmarkResults && <div style={{display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",color:"#9CA3AF",textAlign:"center",minHeight:300}}>
              <div style={{fontSize:36}}>+</div><strong>No benchmark yet</strong>
              <div style={{fontSize:12}}>Select models and click Benchmark Models</div>
            </div>}
            {benchmarkResults && <>
              <h2 style={{marginTop:0}}>Model Comparison Results</h2>
              <p style={{fontSize:12,color:"#6B7280"}}>{benchmarkResults.length} models · {isImage?"Image":"Video"} · {dailyVolume||"volume not set"}</p>
              {benchmarkResults.map((r,i)=><div className="result-card" key={r.id}>
                <div className="result-head">
                  <div><strong>{i+1}. {r.name}</strong><div style={{fontSize:10,color:"#6B7280"}}>{r.vendor}</div></div>
                  <div style={{fontSize:22,fontWeight:900,color:r.overall>=80?C.green:C.amber}}>{r.overall}</div>
                </div>
                <div style={{padding:16,display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 18px"}}>
                  {axes.map(a=><div key={a[0]}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#6B7280",marginBottom:3}}><span>{a[1]}</span><strong>{r.scores[a[0]]}</strong></div>
                    <div className="bar"><div style={{width:r.scores[a[0]]+"%",background:r.scores[a[0]]>=80?"#10B981":"#F59E0B"}}/></div>
                  </div>)}
                </div>
                <div style={{margin:"0 16px 16px",background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"8px 12px",fontSize:11,color:"#166534"}}>Best suited for fashion/e-commerce production with human QA and governance review.</div>
              </div>)}
            </>}
          </div>}
          {innerTab==="prompt" && <CopyPromptTabGeneric
            prompt={prompt} allModels={allModels}
            selectedModels={selectedModels} selectedCriteria={selectedCriteria}
            selectedUseCase={selectedUseCase} dailyVolume={dailyVolume}
            useCases={isImage?BENCH_USE_CASES:VIDEO_USE_CASES}
          />}
        </div>
      </section>;
    }

          "JDY":"fast fashion, youthful affordability, casual trends, easy styling, high-volume retail practicality and social relevance",
          "JJXX":"youth denim, expressive identity, relaxed streetwear, confident individuality, fresh styling and modern casual fashion",
          "KIDS ONLY":"mini-me fashion, playful confidence, color, movement, comfort, trend-led kids styling and joyful attitude",
          "ONLY CARMAKOMA":"inclusive womenswear, confident curves, flattering fit, modern femininity, body positivity and trend relevance",
          "JUNAROSE":"curve-focused femininity, flattering silhouettes, confidence, comfort, versatile styling and accessible elegance",
          "LIL’ ATELIER":"poetic childrenswear, natural textures, soft colors, Nordic calm, handcrafted feeling and delicate storytelling",
          "LMTD":"tween fashion, expressive youth culture, casual confidence, trend-led styling, comfort and social energy",
          "BALMOHK":"premium contemporary expression, refined fashion attitude, clean styling, modern confidence and distinctive visual edge"
        };
        return guides[brand] || "BESTSELLER brand DNA, commercial fashion relevance, product clarity, Nordic quality and market-ready styling";
      };

      const buildPrompts = () => {
        if(!canGenerate) return;
        const guidance = modelGuidance(model,generationType);
        const brandDNA = brandGuidance(selectedBrand);
        const baseContext = `${useCase.label} for ${selectedBrand} within BESTSELLER fashion retail. Brand direction: deeply reflect ${selectedBrand}'s style guide, DNA, values and spirit — ${brandDNA}. Use case context: ${useCase.desc}. Output type: ${generationType}. AI model: ${model.name} (${model.vendor}). Adapt for ${guidance}.`;
        const isVideo = generationType === "Video";
        const nextPrompts = [
          `${baseContext}\n\nCreate a premium ${isVideo?"short fashion video":"fashion retail image"} featuring a hero garment from the current collection. Show the product with accurate color, fabric texture, fit, seams, trims, and scale. Use a clean Scandinavian editorial direction: neutral background, soft natural light, refined styling, calm composition, and commercial-ready polish. Keep the brand identity understated and modern. ${isVideo?"Camera: slow controlled movement, 6-8 seconds, smooth motion, stable model identity, realistic garment drape." : "Camera: 70mm editorial product photography, balanced framing, high-resolution e-commerce quality."} Avoid distorted hands, incorrect logos, broken garment construction, unrealistic fabric, over-styling, or distracting props.`,
          `${baseContext}\n\nGenerate a market-ready concept for a fashion campaign asset. The visual should feel Nordic, minimal, premium, and commercially usable for online retail. Focus on the selected use case by making the product the clear hero while adding enough context to inspire purchase. Include precise styling notes: coordinated outfit, realistic proportions, subtle seasonal palette, natural skin texture, believable fabric behaviour, and consistent lighting. ${isVideo?"Use a simple shot structure: opening product reveal, model movement, close fabric/detail moment, final hero frame. Maintain temporal coherence and no garment morphing." : "Use a refined editorial layout with negative space suitable for copy overlay and responsive cropping."} Negative constraints: no extra limbs, no unreadable text, no brand-inappropriate elements, no celebrity likeness, no exaggerated body shape.`,
          `${baseContext}\n\nProduce a practical production prompt for high-volume fashion retail usage. Prioritize consistency, repeatability, and QA-friendly output. The asset must be suitable for e-commerce, paid social, CRM, and campaign adaptation. Describe the garment accurately, preserve silhouette and construction, use realistic model posture, and keep the setting simple, elegant, and non-distracting. ${isVideo?"Motion requirements: natural walking or subtle pose transition, realistic fabric physics, stable background, stable face and body, no flicker, no warped garment details." : "Image requirements: photorealistic finish, crisp product detail, accurate shadow, clean background integration, natural pose and garment drape."} Add room for localization and copy-safe spacing. Avoid visual noise, legal risk, protected marks, and unrealistic fashion details.`
        ];
        setPrompts(nextPrompts);
      };

      const updatePrompt = (idx,value) => setPrompts(ps=>ps.map((p,i)=>i===idx?value:p));
      const copyPrompt = (text) => navigator.clipboard.writeText(text);

      return <main>
        <section style={{marginBottom:32}}>
          <Divider label="Brand"/>
          {[0,7,14].map(start=><div className="grid-brands" key={start}>
            {BRANDS.slice(start,start+7).map(b=><button key={b} className={"brand-btn "+(selectedBrand===b?"active":"")} onClick={()=>{setSelectedBrand(selectedBrand===b?null:b);setPrompts([]);}}>{b}</button>)}
          </div>)}
        </section>
        <section className="module-card">
          <div className="module-body">
            <div className="context-section">
              <Divider label="Use Case"/>
              <div className="use-grid">
                {USE_CASES.map(u=><button key={u.id} className={"use-card "+(selectedUseCase===u.id?"active":"")} onClick={()=>{setSelectedUseCase(u.id);setPrompts([]);}}>
                  <div className="use-title">{u.label}</div>
                  <div className="use-domain">{u.domain}</div>
                  <div className="use-desc">{u.desc}</div>
                </button>)}
              </div>
            </div>
            <div className="context-section">
              <Divider label="Generation Type"/>
              <div className="chips">
                {["Image","Video"].map(t=><button key={t} className={"chip "+(generationType===t?"active":"")} onClick={()=>{setGenerationType(t);setSelectedModel("");setPrompts([]);}}>{t}</button>)}
              </div>
            </div>
            <div className="context-section">
              <Divider label="AI Model"/>
              <select value={selectedModel} disabled={!generationType} onChange={e=>{setSelectedModel(e.target.value);setPrompts([]);}} style={{width:"100%",border:"1px solid var(--bs-smoke)",borderRadius:"var(--r)",padding:"10px 14px",fontSize:13,color:"var(--bs-ink)",background:"var(--bs-white)",outline:"none"}}>
                <option value="">{generationType ? `Select one ${generationType.toLowerCase()} model` : "Select generation type first"}</option>
                {modelOptions.map(m=><option key={m.id} value={m.id}>{m.name} — {m.vendor}</option>)}
              </select>
            </div>
            <button className="bench-run-btn" disabled={!canGenerate} onClick={buildPrompts}>Generate Prompts</button>
          </div>
        </section>
        {prompts.length>0 && <section className="module-card">
          <div className="module-head">
            <div><div className="module-head-sub">Ready to Copy</div><div className="module-head-title">Generated Prompts</div></div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              <Pill label={selectedBrand} bg="var(--bs-fog)" fg="var(--bs-black)"/>
              <Pill label={useCase.label} bg="var(--bs-fog)" fg="var(--bs-black)"/>
              <Pill label={generationType} bg="var(--bs-smoke)" fg="var(--bs-charcoal)"/>
              <Pill label={model.name} bg="var(--bs-signal-l)" fg="var(--bs-signal)"/>
            </div>
          </div>
          <div className="module-body">
            {prompts.map((p,idx)=><div className="result-card" key={idx}>
              <div className="result-head">
                <strong>Prompt {idx+1}</strong>
                <button className="bench-run-btn" onClick={()=>copyPrompt(p)}>Copy</button>
              </div>
              <div style={{padding:16}}>
                <textarea className="context-textarea" value={p} onChange={e=>updatePrompt(idx,e.target.value)} rows={8}/>
              </div>
            </div>)}
          </div>
        </section>}
      </main>;
    }

    // AI TOOLS LIBRARY
    function Tools() {
      const [filter,setFilter] = useState("Image");
      const filters = ["Image","Video","Platform","Post-Prod"];
      const list = rankedTools(TOOL_LIB).filter(t=>t[2]===filter);
      const tagStyle = (cat) => {
        if(cat==="Image")     return {background:"var(--bs-signal-l)",color:"var(--bs-signal)"};
        if(cat==="Video")     return {background:"var(--bs-warn-l)",  color:"var(--bs-warn)"};
        if(cat==="Platform")  return {background:"var(--bs-smoke)",   color:"var(--bs-charcoal)"};
        if(cat==="Post-Prod") return {background:"var(--bs-ok-l)",    color:"var(--bs-ok)"};
        return {background:"var(--bs-smoke)",color:"var(--bs-charcoal)"};
      };
      return <main className="ai-tools-main">
        <div className="tools-filter-sticky">
          <div className="chips" style={{marginBottom:12}}>
            <span className="category-label-chip">Categories:</span>
            {filters.map(f=><button className={"chip "+(filter===f?"active":"")} key={f} onClick={()=>setFilter(f)}>{f}</button>)}
          </div>
          <div style={{fontSize:11,color:"var(--bs-muted)",letterSpacing:".04em"}}>{list.length} {list.length!==1?"tools":"tool"} shown · ordered by popularity, efficiency and creativity</div>
        </div>
        <div className="tool-grid">
          {list.map((t,i)=><div className="tool-card" key={t[0]+"-"+i}>
            <div className="tool-head">
              <div style={{display:"flex",justifyContent:"space-between",gap:10,alignItems:"flex-start"}}>
                <strong style={{fontSize:14.5,color:"var(--bs-black)",letterSpacing:"-.012em",lineHeight:1.25}}>{t[0]}</strong>
                <span className="tag" style={tagStyle(t[2])}>{t[2]}</span>
              </div>
              <div style={{fontSize:11,color:"var(--bs-mid)",fontWeight:500,marginTop:5,letterSpacing:".02em"}}>{t[1]}</div>
            </div>
            <div style={{padding:"14px 18px",fontSize:12,color:"var(--bs-mid)",lineHeight:1.7}}>
              <div style={{fontWeight:600,color:"var(--bs-charcoal)",marginBottom:3}}>Capabilities</div>
              <div style={{marginBottom:12}}>{t[3]}</div>
              <div style={{fontWeight:600,color:"var(--bs-charcoal)",marginBottom:3}}>Use cases</div>
              <div>{t[4]}</div>
            </div>
            {t[5] && <div style={{padding:"0 18px 14px"}}>
              <a href={t[5]} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:"var(--bs-signal-m)",fontWeight:500,textDecoration:"none",letterSpacing:".02em"}}>Learn more ↗</a>
            </div>}
          </div>)}
        </div>
      </main>;
    }


    // LOGIN ENTRY PAGE
    function LoginPage({onLogin}) {
      return <main className="login-page">
        <section className="login-hero">
          <div className="login-title-stack">
            <div className="bs-page-title">GenAI<span> Media</span></div>
            <div className="workbench-title">Workbench</div>
          </div>
          <div className="login-teaser">Optimize your AI-Powered Creativity</div>
        </section>
        <section className="login-card" aria-label="Login">
          <div className="login-field">
            <label className="login-label" htmlFor="user-id">User ID</label>
            <input id="user-id" className="login-input" type="text" autoComplete="username" />
          </div>
          <div className="login-field">
            <label className="login-label" htmlFor="password">Password</label>
            <input id="password" className="login-input" type="password" autoComplete="current-password" />
          </div>
          <button className="login-button" type="button" onClick={onLogin}>LOGIN</button>
        </section>
        <footer className="login-footer"><strong>BESTSELLER TECH</strong> <span>Creative Solutions</span></footer>
      </main>;
    }

        // APP
    // ════════════════════════════════════════════════════════
    function App() {
      const [isLoggedIn,setIsLoggedIn] = useState(false);
      const [page,setPage] = useState("analyzer");

      useEffect(() => {
        const setStickyOffset = () => {
          const nav = document.querySelector(".nav-shell");
          const height = nav ? Math.ceil(nav.getBoundingClientRect().height) : 0;
          document.documentElement.style.setProperty("--runtime-sticky-top", `${height}px`);
        };
        setStickyOffset();
        window.addEventListener("resize", setStickyOffset);
        window.addEventListener("orientationchange", setStickyOffset);
        return () => {
          window.removeEventListener("resize", setStickyOffset);
          window.removeEventListener("orientationchange", setStickyOffset);
        };
      }, [isLoggedIn]);
      const pages = [
        ["analyzer","Use Case \u2192 Workflow"],
        ["image","Image Models Benchmark"],
        ["video","Video Models Benchmark"],
        ["prompting","Prompt Lab"],
        ["tools","AI Tools Library"],
      ];
      const resetViewportToTop = () => {
        window.scrollTo({top: 0, left: 0, behavior: "auto"});
        document.documentElement.scrollTop = 0;
        document.body.scrollTop = 0;
      };

      const goToPage = (nextPage) => {
        resetViewportToTop();
        setPage(nextPage);
        requestAnimationFrame(resetViewportToTop);
      };

      const handleLogin = () => {
        resetViewportToTop();
        setIsLoggedIn(true);
        requestAnimationFrame(resetViewportToTop);
      };

      useEffect(() => {
        if("scrollRestoration" in window.history) window.history.scrollRestoration = "manual";
      }, []);

      useEffect(() => {
        if(isLoggedIn) resetViewportToTop();
      }, [page, isLoggedIn]);

      if(!isLoggedIn) return <LoginPage onLogin={handleLogin}/>;
      return <div className="app">
        <div className="nav-shell">
          <Header/>
          <div className="tabs">
            {pages.map(p=><button key={p[0]} className={"tab "+(page===p[0]?"active":"")} onClick={()=>goToPage(p[0])}>{p[1]}</button>)}
          </div>
        </div>
        <div className="page-content">
          {page==="analyzer" && <Analyzer/>}
          {page==="image"    && <Benchmark kind="image"/>}
          {page==="video"     && <Benchmark kind="video"/>}
          {page==="prompting" && <Prompting/>}
          {page==="tools"     && <Tools/>}
        </div>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
